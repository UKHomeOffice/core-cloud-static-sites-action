name: "Deploy Static Sites"
description: "Deploys Static Sites using S3 and CloudFront."
inputs:
  assume-role-arn:
    description: "Role assumed by the action."
    required: true
  bucket-name:
    description: "The name of the S3 Bucket."
    required: true
  working-directory:
    description: "Folder the files will be synced from."
    required: true
  remote-path:
    description: "Optional path prefix inside the S3 bucket to sync files to."
    default: ""
    required: false
  extra-excludes:
    description: "Optional comma-separated exclude patterns to pass to aws s3 sync."
    default: ""
    required: false
  cache-control-s-max-age:
    description: "Number of seconds the information will be chached by CloudFront."
    default: 86400
    required: false
  cloudfront-distribution:
    description: "ID Name of CloudFront Distribution."
    required: true

runs:
  using: "composite"
  steps:
    - uses: aws-actions/configure-aws-credentials@v4
      name: Configure AWS IdP Credentials
      with:
        role-to-assume: ${{ inputs.assume-role-arn }}
        role-session-name: GitHubActions
        retry-max-attempts: 5
        aws-region: eu-west-2

    - name: Sync
      shell: bash
      run: |
        cd ./${{ inputs.working-directory }}
        destination="s3://${{ inputs.bucket-name }}/"
        remote_path="${{ inputs.remote-path }}"
        exclude_args=(--exclude ".*" --exclude "*/.*")

        if [ -n "$remote_path" ]; then
          remote_path="${remote_path#/}"
          remote_path="${remote_path%/}"
          destination="${destination}${remote_path}/"
        fi

        IFS=',' read -r -a extra_patterns <<< "${{ inputs.extra-excludes }}"

        for pattern in "${extra_patterns[@]}"; do
          pattern="${pattern#${pattern%%[![:space:]]*}}"
          pattern="${pattern%${pattern##*[![:space:]]}}"

          if [ -n "$pattern" ]; then
            exclude_args+=(--exclude "$pattern")
          fi
        done

        aws s3 sync . "$destination" "${exclude_args[@]}" --delete --cache-control 's-maxage=${{ inputs.cache-control-s-max-age}}'
        aws cloudfront create-invalidation --distribution-id ${{ inputs.cloudfront-distribution }} --paths "/*"
